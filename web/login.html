<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海底圖書館｜登入</title>
    <style>
        body { margin:0; font-family: Arial, 'Microsoft JhengHei', sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#dff7ff,#e9f8ef); }
        .card { width:390px; background:white; border-radius:22px; padding:30px; box-shadow:0 14px 35px rgba(0,80,130,.18); }
        h1 { margin:0 0 6px; color:#046a99; text-align:center; }
        .sub { text-align:center; color:#5f7b88; margin-bottom:22px; }
        label { display:block; margin:14px 0 6px; color:#286277; font-weight:bold; font-size:14px; }
        input { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid #b9dde9; border-radius:12px; outline:none; font-size:15px; }
        input:focus { border-color:#0288d1; box-shadow:0 0 0 3px rgba(2,136,209,.12); }
        button { width:100%; border:0; border-radius:12px; padding:12px; margin-top:16px; font-weight:bold; font-size:16px; cursor:pointer; }
        .primary { background:#0288d1; color:white; }
        .secondary { background:#eff8fb; color:#0277a8; }
        .msg { margin-top:14px; color:#b00020; text-align:center; min-height:20px; }
        .tip { margin-top:16px; color:#607d8b; font-size:13px; line-height:1.6; background:#f6fbfd; border-radius:12px; padding:10px 12px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🌊 海底圖書館</h1>
    <div class="sub">Library Management System</div>

    <label>學號 / 管理者帳號</label>
    <input id="username" placeholder="學生輸入學號，管理員輸入 admin">

    <label>密碼</label>
    <input id="password" type="password" placeholder="預設資料通常是 1234">

    <button class="primary" onclick="login()">登入</button>
    <button class="secondary" onclick="register()">學生註冊</button>

    <div class="msg" id="msg"></div>
    <div class="tip">管理員測試帳號：admin / 1234。學生請用資料庫 users 裡的 student_no 與 password。</div>
</div>

<script>
const API = 'http://localhost:8080/api';
const $ = id => document.getElementById(id);
function enc(v){ return encodeURIComponent(v || ''); }
function setMsg(t){ $('msg').textContent = t || ''; }

async function login(){
    setMsg('登入中...');
    const username = $('username').value.trim();
    const password = $('password').value.trim();
    if(!username || !password){ setMsg('請輸入帳號與密碼'); return; }
    try{
        const res = await fetch(`${API}/login?username=${enc(username)}&password=${enc(password)}`);
        const data = await res.json();
        if(data.success){
            sessionStorage.setItem('libraryUser', JSON.stringify(data));
            location.href = 'app.html';
        }else{
            setMsg(data.message || '登入失敗');
        }
    }catch(e){
        setMsg('連線失敗，請確認 LibraryWebServer 已啟動');
    }
}

async function register(){
    const student_no = $('username').value.trim();
    const password = $('password').value.trim();
    const name = prompt('請輸入姓名');
    if(!student_no || !password || !name){ setMsg('註冊需要學號、姓名、密碼'); return; }
    const body = new URLSearchParams({student_no, name, password});
    try{
        const res = await fetch(`${API}/register`, {method:'POST', body});
        const data = await res.json();
        setMsg(data.message || (data.success ? '註冊成功' : '註冊失敗'));
    }catch(e){
        setMsg('註冊連線失敗');
    }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
