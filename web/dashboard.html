<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>圖書館借還書系統</title>
    <style>
        body { margin: 0; font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f8ff; display: flex; flex-direction: column; height: 100vh; }
        .top-nav { background-color: #0277bd; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 60px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-links { display: flex; gap: 5px; }
        .nav-links span { cursor: pointer; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: 0.3s; font-size: 15px; white-space: nowrap; }
        .nav-links span:hover, .nav-links span.active { background-color: #01579b; }
        .badge { background-color: #e53935; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px; }
        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        .sidebar { width: 250px; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; }
        .sidebar img { width: 80px; height: 80px; background-color: #e1f5fe; border-radius: 50%; margin-bottom: 10px; }
        .content-area { flex: 1; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); overflow-y: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-action { background-color: #29b6f6; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { background-color: #0288d1; }
        .custom-table { border: 1px solid #b3e5fc; border-collapse: collapse; width: 100%; text-align: left; margin-top: 15px; }
        .custom-table th { background-color: #e1f5fe; color: #0277bd; padding: 10px; border: 1px solid #b3e5fc; }
        .custom-table td { padding: 10px; border: 1px solid #b3e5fc; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h3 style="margin: 0; white-space: nowrap;">🌊 海底圖書館</h3>
        <div class="nav-links">
            <span class="active" onclick="switchTab(this, 'search')">🔍 查詢與借閱</span>
            <span onclick="switchTab(this, 'return')">📥 辦理還書</span>
            <span onclick="switchTab(this, 'records')">📜 個人借閱紀錄</span>
            <span onclick="switchTab(this, 'overdue')">⏳ 到期與逾期查詢</span>
            <span onclick="switchTab(this, 'reservations')">📌 預約紀錄查詢</span>
            <span onclick="switchTab(this, 'mailbox')">✉️ 通知信箱<span class="badge">1</span></span>
        </div>
        <div style="white-space: nowrap; margin-left: 20px;">
            歡迎回來, <span id="topNavName" style="font-weight:bold; color:#ffeb3b;">讀者</span>! 
            <button class="btn-action" style="background-color: #e53935; margin-left:10px;" onclick="logout()">登出</button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="sidebar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ocean" alt="頭像">
            <h3 id="sidebarShowName" style="color:#0277bd; margin:10px 0 5px 0;">讀者</h3>
            <p id="sidebarShowIdx" style="color:gray; font-size:14px; margin:0; font-weight:bold;">學號載入中</p>
            <p id="sidebarShowRole" style="color:#00b0ff; font-size:14px; margin:5px 0 0 0; font-weight:bold;">✨ 一般會員</p>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <p id="sidebarShowDays" style="font-size:14px; font-weight:bold; color:#0288d1;">可借閱天數：7 天</p>
        </div>

        <div class="content-area">
            
            <div id="search" class="page-section active">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">🔍 查詢館藏與辦理借閱</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button id="btnShowAll" style="background-color: #0288d1; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer;" onclick="changeBookMode('all')">📖 全部館藏</button>
                    <button id="btnShowFav" style="background-color: white; color: #0288d1; border: 2px solid #b3e5fc; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer;" onclick="changeBookMode('fav')">❤️ 我的收藏</button>
                </div>
                <div id="bookGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;">
                    <p style="color: gray;">書籍載入中... 🫧</p>
                </div>
            </div>

            <div id="return" class="page-section">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">📥 辦理還書</h3>
                
                <div id="borrowedBookGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px;">
                    </div>
            </div>

            <div id="records" class="page-section">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">📜 我的借閱歷史紀錄</h3>
                <table class="custom-table">
                    <thead>
                        <tr><th>借閱書籍名稱</th><th>借出時間</th><th>到期時間</th><th>目前狀態</th></tr>
                    </thead>
                    <tbody id="borrowRecordTableBody">
                        <tr><td colspan="4" style="text-align:center; color:gray;">載入中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="overdue" class="page-section">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">⏳ 借閱到期與逾期狀態查詢</h3>
                <div style="border-left: 4px solid #ff9800; background-color: #fff3e0; padding: 12px 15px; border-radius: 8px; margin-top: 20px; margin-bottom: 15px;">
                    載入到期狀態中...
                </div>
            </div>

            <div id="reservations" class="page-section">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">📌 我的預約紀錄查詢</h3>
                <table class="custom-table">
                    <thead>
                        <tr><th>預約書籍名稱</th><th>預約登記日期</th><th style="text-align: center;">排隊順位</th><th>狀態</th></tr>
                    </thead>
                    <tbody id="reservationTableBody">
                        <tr><td colspan="4" style="text-align:center; color:gray;">載入中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="mailbox" class="page-section">
                <h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">✉️ 我的通知信箱</h3>
                <div style="border-left: 4px solid #e53935; background-color: #ffebee; padding: 10px 15px; border-radius: 5px; margin-top: 20px;">
                    <strong>系統通知：</strong> 歡迎使用新版海底圖書館系統！
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // 🐳 海底圖書館 - 網頁開機啟動紐 (補上這段 🚀)
        // ==========================================
        window.onload = function() {
            // 1. 從 sessionStorage 裡面抓出登入時存下來的學生姓名與學號
            const currentUserName = sessionStorage.getItem("userName") || "讀者";
            const currentStudentNo = sessionStorage.getItem("studentNo") || "未知學號";

            // 2. 找到網頁上的歡迎文字標籤，並把名字塞進去
            // 💡 提示：請確認你原本網頁頂部顯示「歡迎回來...」的標籤 id 是叫 'txtWelcome' 喔！
            const welcomeTag = document.getElementById('txtWelcome');
            if (welcomeTag) {
                welcomeTag.innerText = `👋 歡迎回來，${currentUserName} 同學 (${currentStudentNo})`;
            }

            // 3. 一進大廳自動同步觸發這兩個大腦，把資料庫畫面填滿！
            loadBooks();               // 載入上方的全部書籍卡片
            loadMyBorrowedBooks();     // 載入下方的個人借閱中清單表格
        };
        const SERVER_PORT = "8080"; 
        const BASE_URL = `http://localhost:${SERVER_PORT}/api`;
        let currentBookMode = "all"; // 💡 預設是看全部書籍，點按鈕會切換成 'fav'

        const studentNo = sessionStorage.getItem("studentNo") || "未登入";
        const userName = sessionStorage.getItem("userName") || "讀者";
        const userRole = sessionStorage.getItem("userRole") || "一般會員";
        const borrowDays = sessionStorage.getItem("borrowDays") || "7";

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("topNavName").innerText = userName;
            document.getElementById("sidebarShowName").innerText = userName;
            document.getElementById("sidebarShowIdx").innerText = studentNo;
            document.getElementById("sidebarShowRole").innerText = `✨ ${userRole}`;
            document.getElementById("sidebarShowDays").innerText = `可借閱天數：${borrowDays} 天`;

            loadBooks();
        });

        function switchTab(clickedBtn, tabId) {
            document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.nav-links span').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            clickedBtn.classList.add('active');

            if (tabId === 'search') loadBooks();
            else if (tabId === 'records') loadMyBorrowRecords(studentNo);
            else if (tabId === 'reservations') loadMyReservations(studentNo);
            else if (tabId === 'overdue') loadOverdueStatus(studentNo);
            else if (tabId === 'return') {
            loadMyBorrowedBooksAsCards();
            }
        }

        // 🌟 升級版：支援「全部」與「收藏」一鍵切換
        function loadBooks() {
            // 💡 根據目前模式決定網址，若是 fav 則加上 studentNo 參數
            let fetchUrl = `${BASE_URL}/books`;
            if (currentBookMode === 'fav') {
                const stdNo = sessionStorage.getItem("studentNo") || "未知學號";
                fetchUrl = `${BASE_URL}/myFavorites?studentNo=${stdNo}`;
            }

            fetch(fetchUrl)
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data)) {
                        console.error("後端回傳格式錯誤:", data);
                        document.getElementById('bookGrid').innerHTML = `<p style="color:red; text-align:center; width:100%;">無法載入書籍</p>`;
                        return;
                    }

                    let html = '';
                    if(data.length === 0){
                        html = currentBookMode === 'fav' 
                            ? '<p style="color:gray; text-align:center; width:100%;">目前沒有收藏任何書籍喔 ❤️</p>'
                            : '<p style="color:gray; text-align:center; width:100%;">目前館藏空空如也 🫧</p>';
                    } else {
                        data.forEach(book => {
                            let statusStr = (book.status ? String(book.status).trim() : "未知");
                            
                            // ✅ 保留你剛剛測試最完美的「在庫」防呆大軍邏輯！
                            let isAvailable = statusStr.includes("在庫") || statusStr.includes("在館") || statusStr.includes("可借");
                            let statusColor = isAvailable ? "#4CAF50" : "#e53935";
                            
                            let actionButton = isAvailable
                                ? `<button class="btn-action" style="width:100%; margin-top:10px;" onclick="borrowBook('${book.book_id}')">📤 立即借閱</button>`
                                : `<button class="btn-action" style="width:100%; margin-top:10px; background-color:#ff9800;" onclick="reserveBook('${book.book_id}')">📌 預約排隊</button>`;

                            html += `
                                <div style="border: 1px solid #b3e5fc; padding: 15px; border-radius: 10px; text-align: center; background-color: #fafafa; box-shadow: 0 4px 6px rgba(2, 136, 209, 0.05); display: flex; flex-direction: column; justify-content: space-between;">
                                    <div>
                                        <h4 style="color: #0277bd; margin: 0 0 10px 0; font-size: 18px; cursor: pointer; text-decoration: underline;" 
                                            onclick="openActionMenu('${book.book_id}', '${book.title.replace(/'/g, "\\'")}')">
                                            📖 ${book.title || '未知書名'}
                                        </h4>
                                        <p style="font-size: 13px; color: gray; margin: 5px 0;">作者：${book.author || '未知作者'}</p>
                                        <p style="font-size: 13px; color: #00838f; margin: 0 0 10px 0;">分類：${book.subject || '未分類'}</p>
                                        <span style="background-color: ${statusColor}; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;">
                                            ${statusStr}
                                        </span>
                                    </div>
                                    ${actionButton}
                                </div>
                            `;
                        });
                    }
                    document.getElementById('bookGrid').innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('bookGrid').innerHTML = `<p style="color:red; text-align:center; width:100%;">無法連線到伺服器獲取書籍。</p>`;
                });
        }

        // 🌟 按鈕點擊切換變色機制 (不影響其他功能)
        function changeBookMode(mode) {
            currentBookMode = mode;
            const btnAll = document.getElementById('btnShowAll');
            const btnFav = document.getElementById('btnShowFav');

            if(mode === 'all') {
                btnAll.style.backgroundColor = '#0288d1'; btnAll.style.color = 'white'; btnAll.style.border = 'none';
                btnFav.style.backgroundColor = 'white'; btnFav.style.color = '#0288d1'; btnFav.style.border = '2px solid #b3e5fc';
            } else {
                btnFav.style.backgroundColor = '#0288d1'; btnFav.style.color = 'white'; btnFav.style.border = 'none';
                btnAll.style.backgroundColor = 'white'; btnAll.style.color = '#0288d1'; btnAll.style.border = '2px solid #b3e5fc';
            }
            loadBooks(); // 重新向後端要資料，更新 bookGrid
        }
        // 🌟 2. 處理借書
        function borrowBook(bookId) {
            if(!confirm("確定要借閱這本書嗎？")) return;
            fetch(`${BASE_URL}/borrow?bookId=${bookId}&studentNo=${studentNo}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("🎉 " + data.message);
                        loadBooks(); 
                    } else {
                        alert("❌ 借閱失敗：" + data.message); 
                    }
                }).catch(err => alert("連線失敗，請檢查 Java 伺服器！"));
        }

        // 📌 7. 預約排隊功能 (完美對接版)
        function reserveBook(bookId) {
            const stdNo = sessionStorage.getItem("studentNo") || "未知學號";
            
            if (confirm("確定要排隊預約這本書嗎？\n當書本被歸還時，人魚櫃台會優先將它保留給您喔！🐙")) {
                // 發送 POST 請求給 Java 的預約櫃台
                fetch(`${BASE_URL}/reserve?bookId=${bookId}&studentNo=${stdNo}`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message); // 跳出預約成功或已經預約過的訊息
                        loadBooks();         // 重新刷新畫面卡片
                    })
                    .catch(err => {
                        console.error(err);
                        alert("預約連線失敗，請確認伺服器已重啟並開通預約櫃台！");
                    });
            }
        }

        // 🌟 4. 撈取借閱歷史 (防呆裝甲版 🛡️)
        function loadMyBorrowRecords(stdNo) {
            fetch(`${BASE_URL}/myBorrowRecords?studentNo=${stdNo}`)
                .then(res => res.json())
                .then(data => {
                    // 🛡️ 防呆：確保是陣列
                    if (!Array.isArray(data)) {
                        document.getElementById('borrowRecordTableBody').innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">讀取失敗：${data.message || '異常'}</td></tr>`;
                        return;
                    }

                    let html = '';
                    if (data.length === 0) {
                        html = '<tr><td colspan="4" style="text-align:center; color:gray;">目前沒有借閱紀錄 🫧</td></tr>';
                    } else {
                        data.forEach(record => {
                            let statusStr = record.status || '未知';
                            html += `<tr><td style="font-weight: bold;">📖 ${record.title || '未知書名'}</td><td style="color: gray;">${record.borrow_date || '-'}</td><td style="color: gray;">${record.due_date || '-'}</td><td><span style="color: green; font-weight: bold;">${statusStr}</span></td></tr>`;
                        });
                    }
                    document.getElementById('borrowRecordTableBody').innerHTML = html;
                }).catch(err => console.error(err));
        }
        // 🌟 點擊書名直接觸發的歷史紀錄查詢器 (✅ 不需額外 UI 元件，不影響原本功能)
        function showBookHistoryDirectly(bookId, bookTitle) {
            console.log(`正在查詢書籍歷史, ID: ${bookId}, 書名: ${bookTitle}`);
            
            // 1. 發送請求給我們剛剛開通的 Java 歷史紀錄櫃台
            fetch(`${BASE_URL}/bookHistory?bookId=${bookId}`)
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        alert(`📜 《${bookTitle}》的歷史紀錄\n\n本館藏書目前尚無任何人借閱過喔！🫧`);
                        return;
                    }

                    // 2. 組合親切的歷史清單文字
                    let report = `📜 《${bookTitle}》的歷史借閱軌跡：\n--------------------------------------\n`;
                    
                    data.forEach((row, index) => {
                        let borrowerName = row[0] || "神祕讀者";
                        // 裁切時間字串到分鐘，看起來比較乾淨
                        let borrowDate = row[1] ? row[1].substring(0, 16) : "-";
                        let returnDate = row[2] ? row[2].substring(0, 16) : "❌ 借閱中 (尚未歸還)";
                        
                        report += `${index + 1}. 讀者：${borrowerName}\n   📅 借出：${borrowDate}\n   ↩️ 歸還：${returnDate}\n\n`;
                    });

                    // 3. 一鍵彈出大包裹
                    alert(report);
                })
                .catch(err => {
                    console.error(err);
                    alert("❌ 無法讀取該書歷史紀錄，請確認 Java 伺服器是否重啟，且 Context 註冊正確！");
                });
        }
        // 4. 點擊按鈕：看書評 (完美對接 ReviewDAO)
        function fetchReviews() {
            closeActionMenu();
            console.log("正在查詢書評...");
            fetch(`${BASE_URL}/bookReviews?bookId=${actionBookId}`)
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        alert(`💬 《${actionBookTitle}》的書評\n\n目前還沒有人留下評論喔，你要當第一個嗎？🐠`);
                        return;
                    }
                    
                    let report = `💬 《${actionBookTitle}》的讀者書評：\n--------------------------------------\n`;
                    data.forEach((row) => {
                        // 根據你的 ReviewDAO 回傳：[姓名, 星星字串, 評論, 時間]
                        let name = row[0] || "匿名";
                        let stars = row[1] || ""; 
                        let comment = row[2] || "沒有留下文字...";
                        let date = row[3] || "";
                        
                        report += `🙋 ${name} [${stars}]\n   🕒 留言時間：${date}\n   💬 ${comment}\n\n`;
                    });
                    
                    alert(report);
                }).catch(err => alert("讀取書評連線失敗，請確認伺服器已啟動！"));
        }
        function loadOverdueStatus(stdNo) {
            document.getElementById('overdue').innerHTML = '<h3 style="color: #0277bd; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">⏳ 借閱到期與逾期狀態查詢</h3><p>載入中...</p>';
        }
        function loadMyReservations(stdNo) {
            document.getElementById('reservationTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:gray;">載入中...</td></tr>';
        }

        function logout() {
            sessionStorage.clear();
            alert("您已成功登出！");
            window.location.href = 'login.html';
        }
        // ==========================================
        // 🔮 彈跳選單與書評邏輯
        // ==========================================
        let actionBookId = null;
        let actionBookTitle = "";

        // 1. 打開選擇視窗
        function openActionMenu(bookId, bookTitle) {
            actionBookId = bookId;
            actionBookTitle = bookTitle;
            document.getElementById('menuBookTitle').innerText = "📖 " + bookTitle;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('bookActionMenu').style.display = 'block';
        }

        // 2. 關閉選擇視窗
        function closeActionMenu() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('bookActionMenu').style.display = 'none';
        }

        // 3. 點擊按鈕：看歷史 (呼叫原本寫好的功能)
        function fetchHistory() {
            closeActionMenu(); 
            showBookHistoryDirectly(actionBookId, actionBookTitle); 
        }

        // 4. 點擊按鈕：看書評 (完美對接你隊友寫的 ReviewDAO)
        function fetchReviews() {
            closeActionMenu();
            console.log("正在查詢書評...");
            fetch(`${BASE_URL}/bookReviews?bookId=${actionBookId}`)
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        alert(`💬 《${actionBookTitle}》的書評\n\n目前還沒有人留下評論喔，你要當第一個嗎？🐠`);
                        return;
                    }
                    
                    let report = `💬 《${actionBookTitle}》的讀者書評：\n--------------------------------------\n`;
                    data.forEach((row) => {
                        // 根據 ReviewDAO 回傳：[姓名, 星星字串, 評論, 時間]
                        let name = row[0] || "匿名";
                        let stars = row[1] || ""; 
                        let comment = row[2] || "沒有留下文字...";
                        let date = row[3] || "";
                        
                        report += `🙋 ${name} [${stars}]\n   🕒 留言時間：${date}\n   💬 ${comment}\n\n`;
                    });
                    
                    alert(report);
                }).catch(err => alert("讀取書評連線失敗，請確認伺服器已啟動！"));
        }
        // 5. 點擊按鈕：加入或取消收藏
        function toggleFavorite() {
            closeActionMenu(); // 先把選單關掉
            const stdNo = sessionStorage.getItem("studentNo") || "未知學號";
            
            console.log(`正在發送收藏請求：學號=${stdNo}, 書籍ID=${actionBookId}`);
            
            // 使用 POST 發送給我們剛開好的 toggleFavorite 櫃台
            fetch(`${BASE_URL}/toggleFavorite?studentNo=${stdNo}&bookId=${actionBookId}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    alert(data.message); // 會跳出「已成功加入收藏 ❤️」或「已為您取消收藏 💔」
                    
                    // ✨ 貼心設計：如果你現在剛好在看「我的收藏」分頁，取消收藏後要自動重新載入畫面！
                    if (currentBookMode === 'fav') {
                        loadBooks(); 
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("連線失敗，請確認 Java 伺服器是否有開啟收藏櫃台！");
                });
        }
        // ==========================================
        // ↩️ 專屬：還書區塊的智慧卡片生成與手續辦理
        // ==========================================

        // 1. 去跟 Java 開好的櫃台抓資料，並塞進 id="borrowedBookGrid" 裡面
        function loadMyBorrowedBooksAsCards() {
            const stdNo = sessionStorage.getItem("studentNo") || "未知學號";
            const gridContainer = document.getElementById('borrowedBookGrid');
            if (!gridContainer) return; // 防呆機制

            fetch(`${BASE_URL}/myBorrowedBooks?studentNo=${stdNo}`)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (!Array.isArray(data) || data.length === 0) {
                        html = '<p style="color:gray; text-align:center; width:100%; grid-column: 1/-1; margin-top: 10px;">您手邊目前沒有借閱中的書籍喔 🐳</p>';
                    } else {
                        data.forEach(row => {
                            let bDate = row.borrow_date ? row.borrow_date.substring(0, 10) : "-";
                            let dDate = row.due_date ? row.due_date.substring(0, 10) : "-";
                            
                            // 生成充滿海洋風、帶有還書紐的翡翠綠卡片
                            html += `
                                <div style="border: 2px solid #b2dfdb; padding: 15px; border-radius: 10px; text-align: center; background-color: #e0f2f1; box-shadow: 0 4px 8px rgba(0, 150, 136, 0.1); display: flex; flex-direction: column; justify-content: space-between;">
                                    <div>
                                        <h4 style="color: #00796b; margin: 0 0 10px 0; font-size: 17px; cursor: pointer; text-decoration: underline;" 
                                            onclick="openActionMenu('${row.book_id}', '${row.title.replace(/'/g, "\\'")}')">
                                            🎒 ${row.title}
                                        </h4>
                                        <p style="font-size: 13px; color: #546e7a; margin: 5px 0;">📅 借出日：${bDate}</p>
                                        <p style="font-size: 14px; color: #d32f2f; font-weight: bold; margin: 0 0 10px 0;">⏰ 到期日：${dDate}</p>
                                    </div>
                                    <button style="width:100%; margin-top:10px; background-color:#009688; color: white; border: none; padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 6px rgba(0,150,136,0.2);" 
                                            onclick="executeReturnBook('${row.record_id}', '${row.book_id}', '${row.title.replace(/'/g, "\\'")}')">
                                        ↩️ 辦理還書
                                    </button>
                                </div>
                            `;
                        });
                    }
                    gridContainer.innerHTML = html;
                })
                .catch(err => {
                    console.error("加載個人借閱中清單失敗:", err);
                    gridContainer.innerHTML = '<p style="color:red; text-align:center; width:100%; grid-column: 1/-1;">無法連線至 Java 伺服器，請確認後端已重啟！</p>';
                });
        }

        // 2. 當讀者按下卡片上的「辦理還書」按鈕時觸發的交易
        function executeReturnBook(recordId, bookId, bookTitle) {
            if (confirm(`確定要把《${bookTitle}》歸還給深海管理員嗎？🐙`)) {
                const stdNo = sessionStorage.getItem("studentNo") || "未知學號";
                
                fetch(`${BASE_URL}/returnBook?recordId=${recordId}&bookId=${bookId}&studentNo=${stdNo}`)
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message); // 會跳出還書成功，或自動遞補排隊系統的神奇通知！
                        
                        // 🌟 還書成功後，在眼前把卡片重新刷新，該卡片就會瞬間在眼前消失，體驗極度流暢！
                        loadMyBorrowedBooksAsCards();
                        
                        // 順便把大廳全館書籍狀態更新 (如果大廳剛好也是開著的)
                        if (typeof loadBooks === 'function') loadBooks(); 
                    })
                    .catch(err => alert("還書手續連線失敗！"));
            }
        }
    </script>
<div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:999;" onclick="closeActionMenu()"></div>
    <div id="bookActionMenu" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:15px; box-shadow:0 10px 25px rgba(2,136,209,0.3); z-index:1000; width:300px; text-align:center; border-top: 6px solid #29b6f6;">
        <h3 id="menuBookTitle" style="color:#0277bd; margin-top:0; font-size:18px;">書名</h3>
        <p style="color:gray; font-size:13px; margin-bottom:20px;">請選擇您要查看的項目 🫧</p>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="fetchHistory()" style="background-color:#e1f5fe; color:#0288d1; border:2px solid #b3e5fc; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; transition:0.2s;">📜 查看歷史借閱</button>
            <button onclick="fetchReviews()" style="background-color:#e1f5fe; color:#0288d1; border:2px solid #b3e5fc; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; transition:0.2s;">💬 查看書籍評論</button>
            <button onclick="toggleFavorite()" style="background-color:#ffebee; color:#d32f2f; border:2px solid #ffcdd2; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; transition:0.2s;">❤️ 加入 / 取消收藏</button>
            <button onclick="closeActionMenu()" style="background-color:#e53935; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:5px;">❌ 關閉視窗</button>
        </div>
    </div>
</body>
</html>
